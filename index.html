<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vision:MB Ecosystem | Where Vision Becomes Legacy</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --gold-dark: #9A7A2E;
      --black: #0A0A0A;
      --deep: #111111;
      --charcoal: #1C1C1C;
      --slate: #2A2A2A;
      --mist: #F5F4F0;
      --white: #FFFFFF;
      --accent-green: #2D6A4F;
      --accent-rust: #8B3A2A;
      --accent-blue: #1A3A5C;
      --text-light: #B0A898;
      --radius: 4px;
      --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--white);
      overflow-x: hidden;
    }

    /* ── UTILITY ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
    .section { padding: 100px 0; }
    .section-alt { background: var(--deep); }
    .section-slate { background: var(--charcoal); }
    .gold { color: var(--gold); }
    .serif { font-family: 'Cormorant Garamond', serif; }
    .tag {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold-dark);
      padding: 4px 14px;
      border-radius: 2px;
      margin-bottom: 1rem;
    }
    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin: 1.5rem 0;
    }
    .divider-center { margin: 1.5rem auto; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-block;
      padding: 14px 32px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: var(--radius);
      transition: var(--transition);
      cursor: pointer;
      border: none;
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--black);
    }
    .btn-gold:hover { background: linear-gradient(135deg, var(--gold-light), var(--gold)); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.35); }
    .btn-outline {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
    }
    .btn-outline:hover { background: var(--gold); color: var(--black); transform: translateY(-2px); }
    .btn-ghost {
      background: rgba(255,255,255,0.05);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .btn-group { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(201,168,76,0.15);
      padding: 0 2rem;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 70px;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    .nav-logo span { color: var(--white); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-cta { font-size: 0.72rem; padding: 10px 22px; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center;
      position: relative;
      overflow: hidden;
      padding-top: 70px;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 60% 40%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 80% at 10% 80%, rgba(44,106,79,0.06) 0%, transparent 60%),
        linear-gradient(180deg, #0A0A0A 0%, #0D0D0D 100%);
    }
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-content { position: relative; z-index: 2; max-width: 800px; }
    .hero-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .hero-eyebrow::before {
      content: ''; display: block;
      width: 40px; height: 1px; background: var(--gold);
    }
    .hero-headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 7vw, 6rem);
      font-weight: 300;
      line-height: 1.05;
      margin-bottom: 1.5rem;
      letter-spacing: -0.01em;
    }
    .hero-headline em { font-style: italic; color: var(--gold); }
    .hero-sub {
      font-size: 1.05rem;
      color: var(--text-light);
      line-height: 1.8;
      max-width: 580px;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }
    .hero-stats {
      display: flex; gap: 3rem; margin-top: 4rem;
      padding-top: 2.5rem;
      border-top: 1px solid rgba(201,168,76,0.2);
    }
    .stat-item { text-align: left; }
    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--gold);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-top: 0.3rem;
    }

    /* ── MARQUEE ── */
    .marquee-wrap {
      background: var(--gold);
      padding: 14px 0;
      overflow: hidden;
    }
    .marquee-track {
      display: flex;
      white-space: nowrap;
      animation: marquee 30s linear infinite;
    }
    .marquee-track span {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
      padding: 0 2rem;
    }
    .marquee-track span.dot::after { content: ' ◆ '; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* ── ECOSYSTEM OVERVIEW ── */
    .ecosystem-intro { text-align: center; max-width: 700px; margin: 0 auto 5rem; }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 300;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    .section-body {
      color: var(--text-light);
      line-height: 1.9;
      font-size: 0.95rem;
      font-weight: 300;
    }
    .ecosystem-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.1);
    }
    .eco-card {
      background: var(--deep);
      padding: 3rem 2.5rem;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .eco-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--gold);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: var(--transition);
    }
    .eco-card:hover::before { transform: scaleY(1); }
    .eco-card:hover { background: #161616; }
    .eco-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem;
      font-weight: 300;
      color: rgba(201,168,76,0.15);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .eco-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.8rem;
    }
    .eco-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .eco-desc { color: var(--text-light); font-size: 0.88rem; line-height: 1.8; }

    /* ── BRAND SECTION HEADERS ── */
    .brand-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
      margin-bottom: 5rem;
    }
    .brand-header.reverse { direction: rtl; }
    .brand-header.reverse > * { direction: ltr; }
    .brand-accent-block {
      position: relative;
      padding: 3rem;
      background: var(--slate);
      border: 1px solid rgba(201,168,76,0.15);
    }
    .brand-accent-block::after {
      content: '';
      position: absolute;
      bottom: -8px; right: -8px;
      width: 100%; height: 100%;
      border: 1px solid rgba(201,168,76,0.3);
      pointer-events: none;
    }
    .brand-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    .brand-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      font-weight: 300;
      font-style: italic;
      color: var(--gold-light);
      line-height: 1.4;
    }
    .brand-meta {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; gap: 2rem;
    }
    .brand-meta-item { font-size: 0.78rem; color: var(--text-light); }
    .brand-meta-item strong { display: block; color: var(--white); font-size: 0.9rem; margin-bottom: 2px; }

    /* ── SERVICES GRID ── */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin: 3rem 0;
    }
    .service-card {
      background: var(--charcoal);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 2rem;
      border-radius: var(--radius);
      transition: var(--transition);
      position: relative;
    }
    .service-card:hover {
      border-color: rgba(201,168,76,0.3);
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .service-icon {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.05));
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      margin-bottom: 1.2rem;
    }
    .service-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.6rem;
    }
    .service-desc { font-size: 0.83rem; color: var(--text-light); line-height: 1.8; }
    .service-price {
      margin-top: 1rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      font-weight: 600;
    }

    /* ── ENFJ FEATURED CALLOUT ── */
    .enfj-callout {
      margin-top: 4rem;
      background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03));
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: var(--radius);
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }
    .enfj-callout::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-dark), transparent);
    }
    .enfj-callout-label {
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.8rem;
    }
    .enfj-callout-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 300;
      margin-bottom: 0.8rem;
      line-height: 1.2;
    }
    .enfj-callout-sub {
      font-size: 0.88rem;
      color: var(--text-light);
      line-height: 1.8;
      max-width: 600px;
      margin-bottom: 2rem;
    }
    .enfj-products-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .enfj-product-card {
      background: rgba(10,10,10,0.6);
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: var(--transition);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .enfj-product-card:hover {
      border-color: rgba(201,168,76,0.45);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .enfj-product-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      color: rgba(201,168,76,0.25);
      line-height: 1;
      margin-bottom: 0.6rem;
    }
    .enfj-product-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--white);
    }
    .enfj-product-desc {
      font-size: 0.78rem;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 1rem;
    }
    .enfj-product-cta {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
    }
    .enfj-product-cta::after { content: ' →'; }

    /* ── TRAUMATIC INTELLIGENCE CALLOUT ── */
    .ti-callout {
      margin-top: 3rem;
      background: linear-gradient(135deg, rgba(79,152,163,0.08), rgba(79,152,163,0.03));
      border: 1px solid rgba(79,152,163,0.3);
      border-radius: var(--radius);
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }
    .ti-callout::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, #4f98a3, #2a6b76, transparent);
    }
    .ti-callout-label {
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #4f98a3;
      margin-bottom: 0.8rem;
    }
    .ti-callout-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 300;
      margin-bottom: 0.8rem;
      line-height: 1.2;
      color: var(--white);
    }
    .ti-callout-title em { font-style: italic; color: #4f98a3; }
    .ti-callout-sub {
      font-size: 0.88rem;
      color: var(--text-light);
      line-height: 1.8;
      max-width: 640px;
      margin-bottom: 2rem;
    }
    .ti-tiers {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0 2rem;
    }
    .ti-tier {
      background: rgba(10,10,10,0.6);
      border: 1px solid rgba(79,152,163,0.2);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
    }
    .ti-tier-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 0.3rem;
    }
    .ti-tier-price {
      font-size: 0.72rem;
      color: #4f98a3;
      font-weight: 600;
      letter-spacing: 0.08em;
    }
    .btn-ti {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #4f98a3, #2a6b76);
      color: var(--white);
      text-decoration: none;
      border-radius: var(--radius);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: var(--transition);
    }
    .btn-ti:hover {
      background: linear-gradient(135deg, #6ab4bf, #4f98a3);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(79,152,163,0.35);
    }

    /* ── FAQ ACCORDION ── */
    .faq-list { max-width: 780px; margin: 3rem auto 0; }
    .faq-item {
      border-bottom: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .faq-q {
      padding: 1.5rem 0;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s;
    }
    .faq-q:hover { color: var(--gold); }
    .faq-icon {
      width: 28px; height: 28px;
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--gold);
      transition: var(--transition); flex-shrink: 0;
    }
    .faq-item.open .faq-icon { transform: rotate(45deg); background: var(--gold); color: var(--black); }
    .faq-a {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .faq-item.open .faq-a { max-height: 300px; }
    .faq-a p {
      padding-bottom: 1.5rem;
      color: var(--text-light);
      font-size: 0.88rem;
      line-height: 1.9;
    }

    /* ── CONNECT / CTA SECTION ── */
    .connect-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 3rem;
    }
    .connect-card {
      background: var(--charcoal);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 2.5rem 2rem;
      border-radius: var(--radius);
      text-align: center;
      transition: var(--transition);
    }
    .connect-card:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-4px); }
    .connect-icon { font-size: 2.2rem; margin-bottom: 1rem; }
    .connect-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600; margin-bottom: 0.6rem; }
    .connect-desc { font-size: 0.82rem; color: var(--text-light); line-height: 1.8; margin-bottom: 1.5rem; }

    /* ── NEWSLETTER ── */
    .newsletter-wrap {
      max-width: 600px; margin: 0 auto; text-align: center;
    }
    .nl-form {
      display: flex; gap: 0; margin-top: 2rem;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .nl-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: none; outline: none;
      padding: 14px 20px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
    }
    .nl-input::placeholder { color: var(--text-light); }
    .nl-btn {
      background: var(--gold);
      color: var(--black);
      border: none;
      padding: 14px 28px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s;
    }
    .nl-btn:hover { background: var(--gold-light); }
    .nl-note { font-size: 0.72rem; color: var(--text-light); margin-top: 1rem; }

    /* ── CLIENT EVAL FORM ── */
    .eval-form {
      max-width: 700px; margin: 3rem auto 0;
      background: var(--charcoal);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: var(--radius);
      padding: 3rem;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .form-full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-light); }
    .form-input, .form-select, .form-textarea {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: rgba(201,168,76,0.5); }
    .form-select { cursor: pointer; }
    .form-select option { background: var(--charcoal); }
    .form-textarea { resize: vertical; min-height: 120px; }
    .form-submit { margin-top: 1.5rem; width: 100%; padding: 16px; font-size: 0.85rem; }

    /* ── TESTIMONIAL / SOCIAL PROOF ── */
    .testimonials-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem; margin-top: 3rem;
    }
    .testimonial-card {
      background: var(--charcoal);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 2rem; border-radius: var(--radius);
      position: relative;
    }
    .testimonial-card::before {
      content: '"';
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem;
      color: rgba(201,168,76,0.2);
      position: absolute; top: -10px; left: 20px;
      line-height: 1;
    }
    .testimonial-text { font-size: 0.88rem; color: var(--text-light); line-height: 1.9; margin-bottom: 1.5rem; padding-top: 1rem; }
    .testimonial-author { font-size: 0.8rem; font-weight: 600; }
    .testimonial-role { font-size: 0.72rem; color: var(--gold); letter-spacing: 0.08em; }
    .stars { color: var(--gold); font-size: 0.8rem; margin-bottom: 0.8rem; }

    /* ── UPCOMING / NEW RELEASES ── */
    .releases-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem; margin-top: 3rem;
    }
    .release-card {
      background: var(--deep);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 2rem;
      transition: var(--transition);
      position: relative; overflow: hidden;
    }
    .release-card::after {
      content: '';
      position: absolute; bottom: 0; left: 0;
      height: 2px; width: 0;
      background: var(--gold);
      transition: width 0.4s;
    }
    .release-card:hover::after { width: 100%; }
    .release-status {
      font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 20px;
      display: inline-block; margin-bottom: 1rem;
    }
    .status-new { background: rgba(44,106,79,0.25); color: #5DAA88; border: 1px solid rgba(44,106,79,0.4); }
    .status-soon { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .status-hot { background: rgba(139,58,42,0.25); color: #E07060; border: 1px solid rgba(139,58,42,0.4); }
    .release-name { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .release-brand { font-size: 0.72rem; letter-spacing: 0.12em; color: var(--gold); margin-bottom: 0.6rem; }
    .release-desc { font-size: 0.82rem; color: var(--text-light); line-height: 1.8; }

    /* ── B2B STRIP ── */
    .b2b-strip {
      background: linear-gradient(135deg, #0D1A0F, #0A1204, #0A0A0A);
      border-top: 1px solid rgba(201,168,76,0.15);
      border-bottom: 1px solid rgba(201,168,76,0.15);
      padding: 60px 0;
      text-align: center;
    }

    /* ── FOOTER ── */
    footer {
      background: #050505;
      padding: 70px 0 30px;
      border-top: 1px solid rgba(201,168,76,0.12);
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 3rem;
      margin-bottom: 4rem;
    }
    .footer-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; color: var(--gold); margin-bottom: 1rem;
    }
    .footer-bio { font-size: 0.82rem; color: var(--text-light); line-height: 1.9; }
    .footer-heading {
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1.5rem; font-weight: 600;
    }
    .footer-links { list-style: none; display: flex; flex-direction: column; gap: 0.8rem; }
    .footer-links a {
      font-size: 0.82rem; color: var(--text-light);
      text-decoration: none; transition: color 0.3s;
    }
    .footer-links a:hover { color: var(--white); }
    .footer-bottom {
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-copy { font-size: 0.72rem; color: var(--text-light); }
    .footer-legal { display: flex; gap: 1.5rem; }
    .footer-legal a { font-size: 0.72rem; color: var(--text-light); text-decoration: none; }
    .footer-legal a:hover { color: var(--gold); }

    /* ── BRAND SECTION SPECIFIC COLORS ── */
    .brand-vmb .tag { color: var(--gold); border-color: var(--gold-dark); }
    .brand-drop .tag { color: #5DAA88; border-color: #2D6A4F; }
    .brand-drop .divider { background: linear-gradient(90deg, #2D6A4F, transparent); }
    .brand-photo .tag { color: #7A9CC0; border-color: #1A3A5C; }
    .brand-photo .divider { background: linear-gradient(90deg, #1A3A5C, transparent); }

    /* ── SECTION SEPARATORS ── */
    .section-sep {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    }

    /* ── SCROLL REVEAL CLASSES (JS-driven) ── */

    .reveal.visible { opacity: 1; transform: translateY(0); }
