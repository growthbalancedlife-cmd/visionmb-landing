<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vision:MB Ecosystem | Where Vision Becomes Legacy</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── BRAND PALETTE ──
       #8DA18D  Sage Green    → Grounding
       #4A5D66  Slate Teal    → Trusted Authority
       #F9F7F2  Warm Cream    → Soothing Foundation
       #D1A68F  Terracotta    → Human Connection
    */

    /* ── DARK MODE (default) ── */
    :root,
    [data-theme="dark"] {
      --primary:       #8DA18D;
      --primary-light: #A8BBA8;
      --primary-dark:  #6A7F6A;
      --authority:     #4A5D66;
      --authority-light:#637D8A;
      --cream:         #F9F7F2;
      --human:         #D1A68F;
      --human-light:   #E0BCA9;
      --human-dark:    #B88870;

      --black:    #0C0F0C;
      --deep:     #111511;
      --charcoal: #1A1E1A;
      --slate:    #222722;
      --white:    #F9F7F2;
      --text-light:#9EAD9E;

      --bg-body:    #0C0F0C;
      --bg-section: #111511;
      --bg-alt:     #1A1E1A;
      --bg-card:    #1A1E1A;
      --bg-nav:     rgba(12,15,12,0.93);
      --border:     rgba(141,161,141,0.15);
      --border-strong: rgba(141,161,141,0.3);

      --text-heading: #F9F7F2;
      --text-body:    #C8D2C8;
      --text-muted:   #9EAD9E;

      --radius: 4px;
      --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ── LIGHT MODE ── */
    [data-theme="light"] {
      --primary:       #8DA18D;
      --primary-light: #A8BBA8;
      --primary-dark:  #5C7A5C;
      --authority:     #4A5D66;
      --authority-light:#637D8A;
      --cream:         #F9F7F2;
      --human:         #D1A68F;
      --human-light:   #E0BCA9;
      --human-dark:    #B07355;

      --black:    #1C2220;
      --deep:     #2C3530;
      --charcoal: #3A4440;
      --slate:    #4A5550;
      --white:    #F9F7F2;
      --text-light:#6B7D72;

      --bg-body:    #F9F7F2;
      --bg-section: #EEECe6;
      --bg-alt:     #E5E2D8;
      --bg-card:    #FFFFFF;
      --bg-nav:     rgba(249,247,242,0.96);
      --border:     rgba(74,93,102,0.15);
      --border-strong: rgba(74,93,102,0.3);

      --text-heading: #1C2220;
      --text-body:    #3A4440;
      --text-muted:   #6B7D72;

      --radius: 4px;
      --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-body);
      color: var(--text-body);
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── UTILITY ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
    .section { padding: 100px 0; background: var(--bg-body); }
    .section-alt { background: var(--bg-section); }
    .section-slate { background: var(--bg-alt); }
    .primary { color: var(--primary); }
    .serif { font-family: 'Cormorant Garamond', serif; }
    .tag {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--primary);
      border: 1px solid var(--primary-dark);
      padding: 4px 14px;
      border-radius: 2px;
      margin-bottom: 1rem;
    }
    .divider { width: 60px; height: 2px; background: linear-gradient(90deg, var(--primary), transparent); margin: 1.5rem 0; }
    .divider-center { margin: 1.5rem auto; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-block;
      padding: 14px 32px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: var(--radius);
      transition: var(--transition);
      cursor: pointer;
      border: none;
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--human), var(--human-dark));
      color: #F9F7F2;
    }
    .btn-gold:hover {
      background: linear-gradient(135deg, var(--human-light), var(--human));
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(209,166,143,0.35);
    }
    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
    }
    .btn-outline:hover { background: var(--primary); color: var(--bg-body); transform: translateY(-2px); }
    .btn-ghost {
      background: rgba(141,161,141,0.08);
      color: var(--text-heading);
      border: 1px solid var(--border-strong);
    }
    .btn-ghost:hover { background: rgba(141,161,141,0.18); transform: translateY(-2px); }
    .btn-group { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      background: var(--bg-nav);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      transition: background 0.4s ease;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 70px;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 700;
      color: var(--primary); text-decoration: none; letter-spacing: 0.05em;
    }
    .nav-logo span { color: var(--text-heading); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-muted); text-decoration: none; transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--primary); }
    .nav-cta { font-size: 0.72rem; padding: 10px 22px; }
    .nav-right { display: flex; align-items: center; gap: 1rem; }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      background: none;
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      transition: var(--transition);
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .theme-toggle:hover { border-color: var(--primary); color: var(--primary); }
    .theme-toggle .icon { font-size: 0.9rem; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center;
      position: relative; overflow: hidden;
      padding-top: 70px;
      background: var(--bg-body);
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 60% 40%, rgba(141,161,141,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 80% at 10% 80%, rgba(74,93,102,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 10%, rgba(209,166,143,0.05) 0%, transparent 60%);
    }
    [data-theme="light"] .hero-bg {
      background:
        radial-gradient(ellipse 80% 60% at 60% 40%, rgba(141,161,141,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 50% 80% at 10% 80%, rgba(74,93,102,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 10%, rgba(209,166,143,0.1) 0%, transparent 60%);
    }
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(141,161,141,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(141,161,141,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    [data-theme="light"] .hero-grid {
      background-image:
        linear-gradient(rgba(74,93,102,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,93,102,0.06) 1px, transparent 1px);
    }
    .hero-content { position: relative; z-index: 2; max-width: 800px; }
    .hero-eyebrow {
      font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--primary); margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .hero-eyebrow::before { content: ''; display: block; width: 40px; height: 1px; background: var(--primary); }
    .hero-headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 7vw, 6rem); font-weight: 300; line-height: 1.05;
      margin-bottom: 1.5rem; letter-spacing: -0.01em;
      color: var(--text-heading);
    }
    .hero-headline em { font-style: italic; color: var(--human); }
    .hero-sub {
      font-size: 1.05rem; color: var(--text-muted); line-height: 1.8;
      max-width: 580px; margin-bottom: 2.5rem; font-weight: 300;
    }
    .hero-stats {
      display: flex; gap: 3rem; margin-top: 4rem; padding-top: 2.5rem;
      border-top: 1px solid var(--border);
    }
    .stat-item { text-align: left; }
    .stat-num {
      font-family: 'Cormorant Garamond', serif; font-size: 2.2rem;
      font-weight: 600; color: var(--primary); line-height: 1;
    }
    .stat-label {
      font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-muted); margin-top: 0.3rem;
    }

    /* ── MARQUEE ── */
    .marquee-wrap { background: var(--authority); padding: 14px 0; overflow: hidden; }
    .marquee-track { display: flex; white-space: nowrap; animation: marquee 30s linear infinite; }
    .marquee-track span {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.72rem; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase; color: #F9F7F2; padding: 0 2rem;
    }
    .marquee-track span.dot::after { content: ' \25C6 '; opacity: 0.6; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* ── SECTION TITLES ── */
    .ecosystem-intro { text-align: center; max-width: 700px; margin: 0 auto 5rem; }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 300; line-height: 1.2;
      margin-bottom: 1rem; color: var(--text-heading);
    }
    .section-body { color: var(--text-muted); line-height: 1.9; font-size: 0.95rem; font-weight: 300; }

    /* ── ECOSYSTEM GRID ── */
    .ecosystem-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 2px; background: var(--border); border: 1px solid var(--border);
    }
    .eco-card {
      background: var(--bg-section); padding: 3rem 2.5rem;
      transition: var(--transition); position: relative; overflow: hidden;
    }
    .eco-card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 3px; height: 100%; background: var(--primary);
      transform: scaleY(0); transform-origin: bottom; transition: var(--transition);
    }
    .eco-card:hover::before { transform: scaleY(1); }
    .eco-card:hover { background: var(--bg-alt); }
    .eco-num {
      font-family: 'Cormorant Garamond', serif; font-size: 4rem; font-weight: 300;
      color: var(--border-strong); line-height: 1; margin-bottom: 1rem;
    }
    .eco-brand {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.75rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--primary); margin-bottom: 0.8rem;
    }
    .eco-name {
      font-family: 'Cormorant Garamond', serif; font-size: 1.6rem;
      font-weight: 600; margin-bottom: 1rem; color: var(--text-heading);
    }
    .eco-desc { color: var(--text-muted); font-size: 0.88rem; line-height: 1.8; }

    /* ── BRAND HEADERS ── */
    .brand-header {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 5rem; align-items: center; margin-bottom: 5rem;
    }
    .brand-header.reverse { direction: rtl; }
    .brand-header.reverse > * { direction: ltr; }
    .brand-accent-block {
      position: relative; padding: 3rem;
      background: var(--bg-alt); border: 1px solid var(--border);
    }
    .brand-accent-block::after {
      content: ''; position: absolute; bottom: -8px; right: -8px;
      width: 100%; height: 100%; border: 1px solid var(--border-strong); pointer-events: none;
    }
    .brand-icon { font-size: 3rem; margin-bottom: 1.5rem; display: block; }
    .brand-tagline {
      font-family: 'Cormorant Garamond', serif; font-size: 1.9rem;
      font-weight: 300; font-style: italic; color: var(--human-light); line-height: 1.4;
    }
    .brand-meta {
      margin-top: 2rem; padding-top: 1.5rem;
      border-top: 1px solid var(--border); display: flex; gap: 2rem;
    }
    .brand-meta-item { font-size: 0.78rem; color: var(--text-muted); }
    .brand-meta-item strong { display: block; color: var(--text-heading); font-size: 0.9rem; margin-bottom: 2px; }

    /* ── SERVICE CARDS ── */
    .services-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem; margin: 3rem 0;
    }
    .service-card {
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 2rem; border-radius: var(--radius);
      transition: var(--transition); position: relative;
    }
    .service-card:hover {
      border-color: var(--primary); transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .service-icon {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, rgba(141,161,141,0.2), rgba(141,161,141,0.05));
      border: 1px solid rgba(141,161,141,0.3);
      border-radius: var(--radius); display: flex; align-items: center;
      justify-content: center; font-size: 1.2rem; margin-bottom: 1.2rem;
    }
    .service-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem;
      font-weight: 600; margin-bottom: 0.6rem; color: var(--text-heading);
    }
    .service-desc { font-size: 0.83rem; color: var(--text-muted); line-height: 1.8; }
    .service-price { margin-top: 1rem; font-size: 0.72rem; letter-spacing: 0.1em; color: var(--human); font-weight: 600; }

    /* ── ENFJ CALLOUT ── */
    .enfj-callout {
      margin-top: 4rem;
      background: linear-gradient(135deg, rgba(141,161,141,0.08), rgba(141,161,141,0.03));
      border: 1px solid rgba(141,161,141,0.25);
      border-radius: var(--radius); padding: 3rem; position: relative; overflow: hidden;
    }
    .enfj-callout::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--authority), transparent);
    }
    .enfj-callout-label { font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--primary); margin-bottom: 0.8rem; }
    .enfj-callout-title {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 300; margin-bottom: 0.8rem; line-height: 1.2; color: var(--text-heading);
    }
    .enfj-callout-sub { font-size: 0.88rem; color: var(--text-muted); line-height: 1.8; max-width: 600px; margin-bottom: 2rem; }
    .enfj-products-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .enfj-product-card {
      background: var(--bg-body); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
      transition: var(--transition); text-decoration: none; color: inherit; display: block;
    }
    .enfj-product-card:hover {
      border-color: var(--primary); transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .enfj-product-num {
      font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300;
      color: var(--border-strong); line-height: 1; margin-bottom: 0.6rem;
    }
    .enfj-product-name { font-family: 'Space Grotesk', sans-serif; font-size: 0.88rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-heading); }
    .enfj-product-desc { font-size: 0.78rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 1rem; }
    .enfj-product-cta { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--primary); font-weight: 600; }
    .enfj-product-cta::after { content: ' \2192'; }

    /* ── TI CALLOUT ── */
    .ti-callout {
      margin-top: 3rem;
      background: linear-gradient(135deg, rgba(74,93,102,0.1), rgba(74,93,102,0.04));
      border: 1px solid rgba(74,93,102,0.35);
      border-radius: var(--radius); padding: 3rem; position: relative; overflow: hidden;
    }
    .ti-callout::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--authority), var(--authority-light), transparent);
    }
    .ti-callout-label { font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--authority-light); margin-bottom: 0.8rem; }
    .ti-callout-title {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 300; margin-bottom: 0.8rem; line-height: 1.2; color: var(--text-heading);
    }
    .ti-callout-title em { font-style: italic; color: var(--authority-light); }
    .ti-callout-sub { font-size: 0.88rem; color: var(--text-muted); line-height: 1.8; max-width: 640px; margin-bottom: 2rem; }
    .ti-tiers { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin: 1.5rem 0 2rem; }
    .ti-tier {
      background: var(--bg-body); border: 1px solid rgba(74,93,102,0.25);
      border-radius: var(--radius); padding: 1.2rem 1.5rem;
    }
    .ti-tier-name { font-family: 'Space Grotesk', sans-serif; font-size: 0.82rem; font-weight: 600; color: var(--text-heading); margin-bottom: 0.3rem; }
    .ti-tier-price { font-size: 0.72rem; color: var(--authority-light); font-weight: 600; letter-spacing: 0.08em; }
    .btn-ti {
      display: inline-block; padding: 14px 32px;
      background: linear-gradient(135deg, var(--authority), #2E3D45);
      color: #F9F7F2; text-decoration: none; border-radius: var(--radius);
      font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; transition: var(--transition);
    }
    .btn-ti:hover {
      background: linear-gradient(135deg, var(--authority-light), var(--authority));
      transform: translateY(-2px); box-shadow: 0 8px 30px rgba(74,93,102,0.35);
    }

    /* ── FAQ ── */
    .faq-list { max-width: 780px; margin: 3rem auto 0; }
    .faq-item { border-bottom: 1px solid var(--border); overflow: hidden; }
    .faq-q {
      padding: 1.5rem 0; display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem;
      font-weight: 500; transition: color 0.3s; color: var(--text-heading);
    }
    .faq-q:hover { color: var(--primary); }
    .faq-icon {
      width: 28px; height: 28px; border: 1px solid rgba(141,161,141,0.4);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--primary); transition: var(--transition); flex-shrink: 0;
    }
    .faq-item.open .faq-icon { transform: rotate(45deg); background: var(--primary); color: var(--bg-body); }
    .faq-a { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .faq-item.open .faq-a { max-height: 300px; }
    .faq-a p { padding-bottom: 1.5rem; color: var(--text-muted); font-size: 0.88rem; line-height: 1.9; }

    /* ── CONNECT CARDS ── */
    .connect-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
    .connect-card {
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 2.5rem 2rem; border-radius: var(--radius); text-align: center; transition: var(--transition);
    }
    .conn
